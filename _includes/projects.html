<section id="{{ page.section-type }}" class="container content-section text-center">
  <div class="row">
    <div class="col-md-10 col-md-offset-1">
       {{ page.content | markdownify }}
    </div>
</section>
<div class="container">
  <div class="row">
    {% for portfolio in site.project_list %}
    <div class="col-xs-12 col-sm-6 col-md-6 col-lg-6 text-center">
      <div class="card">
        <img src="{{portfolio.image}}" alt="project" style="width:100%">
        <div class="title">
          <b>{{portfolio.title}}</b>
        </div>
        <div class="body">
          <p>{{portfolio.description}}</p>
        </div>
        <div class="button" align="center">
          <a href="{{portfolio.url1}}" target="_blank" class="btn btn-default">Notebook</a>
          <a href="{{portfolio.url2}}" target="_blank" class="btn btn-default">GitHub Repo</a>
        </div>
        <div class="card-footer">
          <b>Tools Used: {{portfolio.tools}}</b>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</container>
<!-- Project End -->
